<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoリスト</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #0f3460;
      --primary: #e94560;
      --text: #eaeaea;
      --text-muted: #888;
      --border: #2a2a4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 20px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    header h1 { font-size: 1.4rem; }

    .filters {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    #todo-list {
      flex: 1;
      list-style: none;
      overflow-y: auto;
      padding: 8px 0 72px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item span {
      flex: 1;
      font-size: 1rem;
      word-break: break-all;
    }

    .todo-item.done span {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      opacity: 0.6;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { opacity: 1; }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 16px;
      font-size: 0.95rem;
    }

    .input-area {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    #new-todo {
      flex: 1;
      padding: 10px 14px;
      background: var(--accent);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    #new-todo::placeholder { color: var(--text-muted); }
    #new-todo:focus { border-color: var(--primary); }

    #add-btn {
      padding: 10px 18px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>📝 ToDoリスト</h1>
    </header>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了済み</button>
    </div>
    <ul id="todo-list"></ul>
    <div class="input-area">
      <input type="text" id="new-todo" placeholder="新しいタスク…">
      <button id="add-btn">+</button>
    </div>
  </div>
  <script>
    const STORAGE_KEY = 'todo-items';

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    let items = load();
    let filter = 'all';

    function filtered() {
      if (filter === 'active') return items.filter(i => !i.done);
      if (filter === 'done')   return items.filter(i => i.done);
      return items;
    }

    function render() {
      const list = document.getElementById('todo-list');
      const visible = filtered();
      if (visible.length === 0) {
        list.innerHTML = '<li class="empty">タスクはありません</li>';
        return;
      }
      list.innerHTML = visible.map(item => `
        <li class="todo-item${item.done ? ' done' : ''}" data-id="${item.id}">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${item.id})">
          <span>${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${item.id})">🗑</button>
        </li>
      `).join('');
    }

    render();

    function addItem(text) {
      text = text.trim();
      if (!text) return;
      items.push({ id: Date.now(), text, done: false });
      save(items);
      render();
    }

    function toggle(id) {
      const item = items.find(i => i.id === id);
      if (item) { item.done = !item.done; save(items); render(); }
    }

    function remove(id) {
      items = items.filter(i => i.id !== id);
      save(items);
      render();
    }

    function setFilter(f) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === f);
      });
      render();
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      const input = document.getElementById('new-todo');
      addItem(input.value);
      input.value = '';
      input.focus();
    });

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        addItem(e.target.value);
        e.target.value = '';
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => setFilter(btn.dataset.filter));
    });
  </script>
</body>
</html>
