<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoリスト</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #f8f0ff 0%, #fff0f8 50%, #f0f8ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      font-family: 'Nunito', -apple-system, sans-serif;
    }

    #app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 24px 20px 16px;
      background: linear-gradient(135deg, #ff6fd8, #3813c2);
      color: white;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .filters {
      display: flex;
      background: white;
      padding: 10px 12px 0;
      gap: 8px;
      border-bottom: 2px solid #f0e0ff;
    }

    .filter-btn {
      flex: 1;
      padding: 8px 4px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: #aaa;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 6px 6px 0 0;
    }

    .filter-btn.active {
      color: #c026d3;
      border-bottom-color: #c026d3;
    }

    #todo-list {
      flex: 1;
      list-style: none;
      overflow-y: auto;
      padding: 12px 12px 80px;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(180, 100, 220, 0.1);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .todo-item:active { transform: scale(0.98); }

    .todo-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: #c026d3;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item span {
      flex: 1;
      font-size: 1rem;
      font-weight: 700;
      color: #333;
      word-break: break-all;
    }

    .todo-item.done span {
      text-decoration: line-through;
      color: #ccc;
      font-weight: 400;
    }

    .delete-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      opacity: 0.4;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { opacity: 1; }

    .empty {
      text-align: center;
      color: #ccc;
      padding: 48px 16px;
      font-size: 1rem;
      font-weight: 700;
    }

    .empty::before {
      display: block;
      font-size: 2.5rem;
      margin-bottom: 10px;
      content: '🎉';
    }

    .input-area {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: white;
      border-top: 2px solid #f0e0ff;
    }

    #new-todo {
      flex: 1;
      padding: 12px 16px;
      background: #fdf4ff;
      border: 2px solid #e9d5ff;
      border-radius: 24px;
      color: #333;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 700;
      outline: none;
      transition: border-color 0.2s;
    }

    #new-todo::placeholder { color: #ccc; font-weight: 400; }
    #new-todo:focus { border-color: #c026d3; }

    #add-btn {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #ff6fd8, #c026d3);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.6rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(192, 38, 211, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #add-btn:active {
      transform: scale(0.92);
      box-shadow: 0 2px 6px rgba(192, 38, 211, 0.3);
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>📝 ToDoリスト</h1>
    </header>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了済み</button>
    </div>
    <ul id="todo-list"></ul>
    <div class="input-area">
      <input type="text" id="new-todo" placeholder="新しいタスク…">
      <button id="add-btn">+</button>
    </div>
  </div>
  <script>
    const STORAGE_KEY = 'todo-items';

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    let items = load();
    let filter = 'all';

    function filtered() {
      if (filter === 'active') return items.filter(i => !i.done);
      if (filter === 'done')   return items.filter(i => i.done);
      return items;
    }

    function render() {
      const list = document.getElementById('todo-list');
      const visible = filtered();
      if (visible.length === 0) {
        list.innerHTML = '<li class="empty">タスクはありません</li>';
        return;
      }
      list.innerHTML = visible.map(item => `
        <li class="todo-item${item.done ? ' done' : ''}" data-id="${item.id}">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${item.id})">
          <span>${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${item.id})">🗑</button>
        </li>
      `).join('');
    }

    render();

    function addItem(text) {
      text = text.trim();
      if (!text) return;
      items.push({ id: Date.now(), text, done: false });
      save(items);
      render();
    }

    function toggle(id) {
      const item = items.find(i => i.id === id);
      if (item) { item.done = !item.done; save(items); render(); }
    }

    function remove(id) {
      items = items.filter(i => i.id !== id);
      save(items);
      render();
    }

    function setFilter(f) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === f);
      });
      render();
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      const input = document.getElementById('new-todo');
      addItem(input.value);
      input.value = '';
      input.focus();
    });

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        addItem(e.target.value);
        e.target.value = '';
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => setFilter(btn.dataset.filter));
    });
  </script>
</body>
</html>
